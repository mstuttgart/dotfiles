include-file = ~/.config/polybar/themes/colors.ini

[custom]
padding = 1

[settings]
screenchange-reload = true
pseudo-transparency = false

;-----------------------------------------------

[bar/main]
width = 100%
height = 43
radius = 10

fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 0
padding-bottom = 0
padding-up = 0

border-size = 5
border-color = ${colors.background}00

module-margin-left = 0
module-margin-right = 0
module-margin-up = 0

font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "SauceCodePro Nerd Font:size=12;3"

modules-left = launcher i3 player-mpris-simple
modules-center = date
modules-right = style-switch filesystem cpu memory battery network volume powermenu

tray-position = right
tray-padding = 2
tray-background = ${colors.background}

cursor-click = pointer
cursor-scroll = pointer

line-size = 2

enable-ipc = true

;-----------------------------------------------
;
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
format-background = ${colors.background}

index-sort = true
wrapping-scroll = false

label-mode-padding = ${custom.padding}
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.color_03}

; focused = Active workspace on focused monitor
label-focused = %index%
label-focused-underline = ${colors.color_11}
label-focused-padding = ${custom.padding}

; unfocused = Inactive workspace on any monitor
label-unfocused = %index%
label-unfocused-padding = ${custom.padding}

; visible = Active workspace on unfocused monitor
label-visible = %index%
label-visible-underline = ${colors.color_03}
label-visible-padding = ${custom.padding}

; urgent = Workspace with urgency hint set
label-urgent = %index%
label-urgent-padding = ${custom.padding}

; Separator in between workspaces
label-separator = ‚ĒÜ

;-----------------------------------------------

[module/style-switch]
type = custom/script
exec = echo Óąę
interval = 100
label = "  %output%  "

;format-background = ${colors.white}
format-foreground = ${colors.foreground}

click-left = ~/.config/polybar/scripts/theme.sh -r

;-----------------------------------------------
;
[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

format = <ramp> <label>
format-background = ${colors.background}
format-padding = ${custom.padding}

; Available tokens:
;   %percentage% (default)
; label = %percentage%%

ramp-foreground = ${colors.color_04}
ramp-font = 2

; Only applies if <ramp> is used
ramp-4 = "ůĪ©Ė "
ramp-3 = "ůĪ©Ē "
ramp-2 = "ůĪ©í "
ramp-1 = "ůĪ©ź "
ramp-0 = "ůĪ©é "

;-----------------------------------------------
;
[module/windowtitle]
type = internal/xwindow

format = <label>
format-background = ${colors.background}
format-padding = ${custom.padding}

format-prefix = ůĪ££
format-prefix-foreground = ${colors.color_03}
format-prefix-font = 2

label = " %title%"
label-maxlen = 50
label-empty = " free"
label-separator = " "

label-empty-foreground = ${colors.color_08}

;-----------------------------------------------

[module/volume]
type = internal/pulseaudio
format-volume =  "<ramp-volume> <label-volume>"

ramp-volume-foreground = ${colors.color_07}

ramp-volume-0 ="ÔÄ¶ "
ramp-volume-0-font = 2
ramp-volume-1 ="ÔÄß "
ramp-volume-1-font = 2 
ramp-volume-2 ="ÔÄ® "
ramp-volume-2-font = 2

format-volume-background = ${colors.background}
format-volume-padding = ${custom.padding}

format-muted = <label-muted>
format-muted-background = ${colors.background}
format-muted-foreground = ${colors.color_02}
format-muted-prefix = " ÔĎ¶ "
format-muted-prefix-foreground = ${colors.color_02}
format-muted-font = 2

;-----------------------------------------------
[module/battery]
type = internal/battery

battery = BAT1
adapter = ACAD

full-at = 99
low-at = 5

time-format = %H%m

format-charging = <label-charging>
format-charging-background = ${colors.background}

format-charging-prefix = "ůĪü° "
format-charging-prefix-font = 2
format-charging-prefix-foreground = ${colors.color_04}

format-charging-padding = ${custom.padding}

label-charging = "%percentage%%"

format-discharging = <label-discharging>
format-discharging-background = ${colors.background}

format-discharging-prefix = "ůĪüě "
format-discharging-prefix-font = 2
format-discharging-prefix-foreground = ${colors.color_12}

format-discharging-padding = ${custom.padding}

label-discharging = "%percentage%%"

format-full-prefix = "ůĪüĘ "
format-full-prefix-font = 2
format-full-prefix-foreground = ${colors.color_03}

format-full-padding = ${custom.padding}
format-full-background = ${colors.background}

label-full = "%percentage%%"

format-low-prefix = "ůĪüü "
format-low-prefix-font = 2
format-low-prefix-foreground = ${colors.color_02}

format-low-padding = ${custom.padding}
format-low-background = ${colors.background}

label-low = "%percentage%%"

;-----------------------------------------------
[module/network]
type = internal/network
interval = 2

interface = wlp0s20f3
interface-type = wireless

format-connected = <label-connected>

format-connected-prefix = "ůĪöĹ "
format-connected-prefix-foreground = ${colors.color_05}
format-connected-prefix-font = 2

label-connected = %essid%
label-connected-font = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = " ůĪõÖ"
format-disconnected-prefix-foreground = ${colors.color_02}

format-connected-background = ${colors.background}
format-disconnected-background = ${colors.background}

format-connected-padding = ${custom.padding}
format-disconnected-padding = ${custom.padding}
;-----------------------------------------------

[module/player-mpris-simple]
type = custom/script
interval = 1

exec = ~/.config/polybar/scripts/player-mpris-simple.sh

format-prefix = " ÔÄ• "
format-prefix-foreground = ${colors.color_03}
format-prefix-font = 2

format = <label>
format-foreground = ${colors.foreground}
format-background = ${colors.background}

label-padding = ${custom.padding}

click-left = playerctl play-pause

;-----------------------------------------------
;
[module/memory]
type = internal/memory
; Seconds to sleep between updates
interval = 3

label = "%percentage_used%%"

format-prefix = "Óąī "
format-prefix-foreground = ${colors.color_12}
format-prefix-font = 2

format-background = ${colors.background}
format-padding = ${custom.padding}

;-----------------------------------------------

[module/cpu]
type = internal/cpu

interval = 1
format = <label>
format-background = ${colors.background}
format-padding = ${custom.padding}
label = "%percentage%% "

format-prefix = "ůį°Ķ "
format-prefix-foreground = ${colors.color_03}
format-prefix-font = 2

;-----------------------------------------------
;
[module/date]
type = internal/date
interval = 1

date = "%a, %b %d"
time = "%H:%M:%S"

format-prefix = "ůįłė %{A1:gsimplecal:} %{A}"
format-prefix-foreground = ${colors.color_03}
format-prefix-font = 2

format-padding = ${custom.padding}
format-background = ${colors.background}
format-foreground = ${colors.foreground}

label = "%date% %time%"

;-----------------------------------------------
;
; [module/shutdown]
; type = custom/script
; exec = echo ÔÄĎ 
; interval = 100
;
; format-prefix = "‚ĒÜ "
; format-prefix-foreground = ${colors.foreground}
;
; format-foreground = ${colors.color_03}
; format-padding = 3
;
; click-left = $HOME/.config/polybar/scripts/rofi-poweroff.sh

;-----------------------------------------------
;; Power Menu Module
[module/powermenu]
type = custom/text

content-prefix = "ÔÄĎ "
content-prefix-foreground = ${colors.color_03}
content-prefix-background = ${colors.background}
content-prefix-padding = 2
content-prefix-font = 2

content = " "
content-background = ${colors.background}
content-foreground = ${colors.color_03}

click-left = $HOME/.config/rofi/powermenu/type-1/powermenu.sh
click-right = powermenu_t1

;------------------------------------------------
;
[module/launcher]
type = custom/text

content-prefix = " ÔĆÉ"
content-prefix-foreground = ${colors.color_03}
content-prefix-background = ${colors.background}
content-prefix-padding = 2
content-prefix-font = 2

content = " "
content-background = ${colors.background}
content-foreground = ${colors.foreground}

click-left = $HOME/.config/rofi/launchers/type-1/launcher.sh

;--------------------------------------------------
;
[module/filesystem]
type = internal/fs

mount-0 = /
interval = 10

fixed-values = true
format-mounted = <label-mounted>
format-mounted-background = ${colors.background}
format-mounted-padding = ${custom.padding}

format-mounted-prefix = "ÓĮ§ "
format-mounted-prefix-foreground = ${colors.color_06}
format-mounted-prefix-font = 2

format-unmounted = <label-unmounted>
format-unmounted-background = ${colors.background}

label-mounted = "%percentage_used%%"
label-unmounted = %mountpoint%: not mounted

